name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends cmake ninja-build libasound2-dev

      - name: Cache Catch2
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: catch2-v3.8.1

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build tests
        run: cmake --build build --target synth_tests

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
